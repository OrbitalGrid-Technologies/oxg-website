<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download OXG Logo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
    body {
      background: #000;
      color: white;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .preview-container {
      background: #050505;
      padding: 40px;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    button {
      padding: 14px 28px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      background: white;
      color: black;
      border: none;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <canvas id="logoCanvas" width="800" height="800"></canvas>
  </div>
  <button id="downloadBtn">Download PNG with Brand Teal Background</button>

  <script>
    // Wait for the Google Font to load before drawing to canvas
    document.fonts.ready.then(() => {
      const canvas = document.getElementById('logoCanvas');
      const ctx = canvas.getContext('2d');
      
      const width = canvas.width;
      const height = canvas.height;
      
      // Fill with brand teal background
      ctx.fillStyle = '#011C22';
      ctx.fillRect(0, 0, width, height);
      
      const fontSize = 260; // Larger font to fill the square horizontally
      const letterSpacing = 40; // Scaled up letter-spacing
      
      // Calculate text widths
      ctx.font = `600 ${fontSize}px Montserrat`;
      const oWidth = ctx.measureText('O').width;
      const gWidth = ctx.measureText('G').width;
      
      ctx.font = `300 ${fontSize}px Montserrat`;
      const xWidth = ctx.measureText('X').width;
      
      const totalWidth = oWidth + letterSpacing + xWidth + letterSpacing + gWidth;
      
      let currentX = (width - totalWidth) / 2;
      const centerY = height / 2 + 15;
      
      // 1. Draw 'O'
      ctx.font = `600 ${fontSize}px Montserrat`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText('O', currentX, centerY);
      
      // 2. Draw 'X' (Thin font)
      currentX += oWidth + letterSpacing;
      ctx.font = `300 ${fontSize}px Montserrat`;
      ctx.fillStyle = '#ffffff';
      ctx.textBaseline = 'middle';
      ctx.fillText('X', currentX, centerY);
      
      // 3. Draw 'G'
      currentX += xWidth + letterSpacing;
      ctx.font = `600 ${fontSize}px Montserrat`;
      ctx.fillStyle = '#ffffff';
      ctx.textBaseline = 'middle';
      ctx.fillText('G', currentX, centerY);
      
      // Set up download
      document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'OXG_Logo_Transparent.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
    });
  </script>
</body>
</html>
