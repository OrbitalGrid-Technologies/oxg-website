], [141, 185], [142, 143], [142, 185], [142, 186], [142, 187], [143, 144], [143, 187], [143, 188], [144, 145], [144, 188], [144, 189], [145, 146], [145, 189], [145, 190], [146, 147], [146, 190], [146, 191], [147, 148], [147, 191], [147, 192], [148, 149], [148, 192], [148, 193], [149, 150], [149, 193], [149, 194], [149, 195], [150, 151], [150, 195], [150, 196], [151, 152], [151, 196], [151, 197], [152, 153], [152, 197], [152, 198], [153, 154], [153, 198], [153, 199], [154, 155], [154, 199], [154, 200], [155, 156], [155, 200], [155, 201], [156, 157], [156, 201], [156, 202], [156, 203], [157, 158], [157, 203], [157, 204], [158, 159], [158, 204], [158, 205], [159, 160], [159, 205], [159, 206], [160, 161], [160, 206], [160, 207], [161, 162], [161, 207], [161, 208], [162, 163], [162, 208], [162, 209], [163, 164], [163, 209], [163, 210], [163, 211], [164, 165], [164, 211], [164, 212], [165, 166], [165, 212], [165, 213], [166, 167], [166, 213], [166, 214], [167, 168], [167, 214], [167, 215], [168, 169], [168, 215], [168, 216], [169, 216], [169, 217], [170, 171], [170, 217], [171, 172], [171, 218], [172, 173], [172, 218], [173, 174], [173, 218], [174, 175], [174, 218], [174, 219], [175, 176], [175, 219], [176, 177], [176, 219], [177, 178], [177, 219], [178, 179], [179, 180], [179, 220], [180, 181], [180, 220], [181, 182], [181, 220], [182, 183], [182, 220], [182, 221], [183, 184], [183, 221], [184, 185], [184, 221], [185, 186], [185, 221], [186, 187], [187, 188], [187, 222], [188, 189], [188, 222], [189, 190], [189, 222], [190, 191], [190, 222], [190, 223], [191, 192], [191, 223], [192, 193], [192, 223], [193, 194], [193, 223], [194, 195], [195, 196], [195, 224], [196, 197], [196, 224], [197, 198], [197, 224], [198, 199], [198, 224], [198, 225], [199, 200], [199, 225], [200, 201], [200, 225], [201, 202], [201, 225], [202, 203], [203, 204], [203, 226], [204, 205], [204, 226], [205, 206], [205, 226], [206, 207], [206, 226], [206, 227], [207, 208], [207, 227], [208, 209], [208, 227], [209, 210], [209, 227], [210, 211], [211, 212], [211, 228], [212, 213], [212, 228], [213, 214], [213, 228], [214, 215], [214, 228], [214, 229], [215, 216], [215, 229], [216, 217], [216, 229], [217, 229]], "focal_length_top": 3500.0, "po_analysis": {}, "metrics": {"directivity": 43.1, "hpbw": 1.1, "sll": -25.0}};

    // --- APP STATE & RECORDER ---
    let mediaRecorder;
    let recordedChunks = [];
    const canvas = document.createElement('canvas');
    let stream;
    
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, -60, 40);
    camera.lookAt(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, -10, 20);
    scene.add(dirLight);
    
    const pointLight = new THREE.PointLight(0x00ffcc, 1, 100);
    pointLight.position.set(0, 0, 20);
    scene.add(pointLight);

    // --- GLOBALS ---
    let pointsMat, wireMat, solidMat, radMat;
    let feedObj, radObj, meshGroup, waveGroup, waveMats = [];
    let satGroup, satWireMat, satSolidMat, systemGroup;
    let FOCAL_LENGTH = 35; // default scaled

    function initMaxwellMesh(data) {
        systemGroup = new THREE.Group();
        scene.add(systemGroup);
        
        meshGroup = new THREE.Group();
        systemGroup.add(meshGroup);

        if (!data || !data.global_coordinates_top_net) {
            console.error("No valid data provided");
            return;
        }

        const scale = 0.01; // Scale 3500mm -> 35 units
        FOCAL_LENGTH = (data.focal_length_top || 3500) * scale;
        
        const coords = data.global_coordinates_top_net;
        const edges = data.Elem_Conn_Matrix_Top_Net;
        
        const nodes = [];
        const nodesMap = {};
        const targetZ = [];
        
        // Center the mesh on X/Y plane for visualization
        let cx=0, cy=0;
        coords.forEach(r => { cx+=r[1]; cy+=r[2]; });
        cx /= coords.length; cy /= coords.length;

        coords.forEach(r => {
            const id = r[0];
            const x = (r[1] - cx) * scale;
            const y = (r[2] - cy) * scale;
            const z = r[3] * scale;
            nodes.push(new THREE.Vector3(x, y, 0)); // Start flat
            nodesMap[id] = {index: nodes.length-1, targetZ: z};
            targetZ.push(z);
        });
        
        // --- 1. WIREFRAME ---
        const edgeGeo = new THREE.BufferGeometry();
        const edgePositions = [];
        const adj = {};
        
        edges.forEach(e => {
            const u = e[0], v = e[1];
            if (!nodesMap[u] || !nodesMap[v]) return;
            
            if(!adj[u]) adj[u] = new Set();
            adj[u].add(v);
            if(!adj[v]) adj[v] = new Set();
            adj[v].add(u);
            
            const pt1 = nodes[nodesMap[u].index];
            const pt2 = nodes[nodesMap[v].index];
            edgePositions.push(pt1.x, pt1.y, 0, pt2.x, pt2.y, 0);
        });
        
        edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
        wireMat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0 });
        const wireObj = new THREE.LineSegments(edgeGeo, wireMat);
        meshGroup.add(wireObj);

        // --- 2. POINTS ---
        const pointsGeo = new THREE.BufferGeometry().setFromPoints(nodes);
        pointsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0 });
        const pointsObj = new THREE.Points(pointsGeo, pointsMat);
        meshGroup.add(pointsObj);

        // --- 3. TRIANGLES (Solid) ---
        const indices = [];
        const nodesList = Object.keys(adj).map(Number).sort((a,b)=>a-b);
        
        for(let i=0; i<nodesList.length; i++){
            let u = nodesList[i];
            for(let j=i+1; j<nodesList.length; j++){
                let v = nodesList[j];
                if(adj[u].has(v)){
                    for(let k=j+1; k<nodesList.length; k++){
                        let w = nodesList[k];
                        if(adj[u].has(w) && adj[v].has(w)){
                            indices.push(nodesMap[u].index, nodesMap[v].index, nodesMap[w].index);
                        }
                    }
                }
            }
        }
        
        const solidGeo = new THREE.BufferGeometry().setFromPoints(nodes);
        solidGeo.setIndex(indices);
        solidGeo.computeVertexNormals();
        
        solidMat = new THREE.MeshStandardMaterial({ 
          color: 0x333333, 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0,
          roughness: 0.6,
          metalness: 0.4
        });
        const solidObj = new THREE.Mesh(solidGeo, solidMat);
        meshGroup.add(solidObj);

        // --- EXTRAS (Feed & Rad Pattern) ---
        const feedGeo = new THREE.ConeGeometry(0.5, 1, 16);
        feedGeo.rotateX(Math.PI/2);
        const feedMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
        feedObj = new THREE.Mesh(feedGeo, feedMat);
        feedObj.position.set(0, 0, FOCAL_LENGTH);
        feedObj.scale.set(0.01, 0.01, 0.01);
        systemGroup.add(feedObj);

        const radGeo = new THREE.SphereGeometry(4, 32, 32);
        const radPos = radGeo.attributes.position;
        for(let i=0; i<radPos.count; i++) {
          let x = radPos.getX(i), y = radPos.getY(i), z = radPos.getZ(i);
          let r = Math.sqrt(x*x + y*y + z*z);
          let theta = Math.acos(z/r); 
          let gain = Math.abs(Math.cos(theta * 2)) + Math.pow(Math.cos(theta), 8) * 5;
          if (z < 0) gain *= 0.2; 
          radPos.setXYZ(i, x*gain, y*gain, z*gain);
        }
        radGeo.computeVertexNormals();
        
        radMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc, transparent: true, opacity: 0, wireframe: true, emissive: 0x005544 });
        radObj = new THREE.Mesh(radGeo, radMat);
        radObj.position.set(0, 0, FOCAL_LENGTH);
        systemGroup.add(radObj);
        
        waveGroup = new THREE.Group();
        waveGroup.position.set(0, 0, FOCAL_LENGTH);
        systemGroup.add(waveGroup);
        
        for(let i=0; i<3; i++) {
            const wGeo = new THREE.RingGeometry(0.1, 0.2, 32);
            const wMat = new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0, side: THREE.DoubleSide});
            const wObj = new THREE.Mesh(wGeo, wMat);
            waveGroup.add(wObj);
            waveMats.push(wMat);
        }
        
        // --- SATELLITE (Input Tab Animation Step) ---
        satGroup = new THREE.Group();
        systemGroup.add(satGroup);
        
        const satSize = 2400 * scale; 
        const offsetDist = 250 * scale; 
        const satZ = -(satSize / 2 + offsetDist);
        
        const satGeo = new THREE.BoxGeometry(satSize, satSize, satSize);
        const satEdges = new THREE.EdgesGeometry(satGeo);
        satWireMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0 });
        const satWireObj = new THREE.LineSegments(satEdges, satWireMat);
        
        satSolidMat = new THREE.MeshBasicMaterial({ color: 0x004433, transparent: true, opacity: 0, depthWrite: false });
        const satSolidObj = new THREE.Mesh(satGeo, satSolidMat);
        
        satGroup.add(satWireObj);
        satGroup.add(satSolidObj);
        satGroup.position.set(0, 0, satZ);

        window.meshData = { pointsGeo, edgeGeo, solidGeo, nodes, targetZ, edges, nodesMap, metrics: data.metrics };
    }

    // --- ANIMATION SEQUENCE ---
    function startAnimationSequence() {
      const tl = gsap.timeline({ onComplete: stopRecording });

      tl.to("#start-panel", {opacity: 0, duration: 0.5, onComplete: () => { document.getElementById('start-panel').style.display = 'none'; }});
      
      // Phase 0: Satellite Bounding Box appears
      tl.to(satWireMat, {opacity: 1, duration: 1})
        .to(satSolidMat, {opacity: 0.3, duration: 1}, "-=0.5")
        .to(systemGroup.rotation, {x: Math.PI/12, z: Math.PI/6, duration: 2, ease: "power1.out"}, "-=1.5");

      tl.to("#label-freq", {opacity: 1, duration: 0.5, x: 20})
        .to("#label-dia", {opacity: 1, duration: 0.5, x: 20}, "-=0.3")
        .to("#label-fd", {opacity: 1, duration: 0.5, x: 20}, "-=0.3")
        .to("#label-rms", {opacity: 1, duration: 0.5, x: 20}, "-=0.3")
        .to("#label-offset", {opacity: 1, duration: 0.5, x: 20}, "-=0.3");
        
      tl.to([".floating-label"], {opacity: 0, duration: 0.5, x: 100}, "+=1");

      // Phase 1: Draw Mesh (starts flat above the satellite)
      tl.to(pointsMat, {opacity: 1, duration: 1})
        .to(wireMat, {opacity: 0.5, duration: 1})
        .to(solidMat, {opacity: 0.8, duration: 1}, "-=0.5");

      const dummyObj = { val: 0 };
      tl.to(dummyObj, {
        val: 1, duration: 3.0, ease: "power2.inOut",
        onUpdate: () => {
          const m = window.meshData;
          if (!m) return;
          const posP = m.pointsGeo.attributes.position;
          const posS = m.solidGeo.attributes.position;
          const posE = m.edgeGeo.attributes.position;
          
          for (let i = 0; i < m.nodes.length; i++) {
              let tz = m.targetZ[i] * dummyObj.val;
              posP.setZ(i, tz);
              posS.setZ(i, tz);
          }
          
          let edgeIdx = 0;
          m.edges.forEach(e => {
                const u = e[0], v = e[1];
                if (!m.nodesMap[u] || !m.nodesMap[v]) return;
                posE.setZ(edgeIdx, m.targetZ[m.nodesMap[u].index] * dummyObj.val); edgeIdx++;
                posE.setZ(edgeIdx, m.targetZ[m.nodesMap[v].index] * dummyObj.val); edgeIdx++;
          });
          
          posP.needsUpdate = true; posS.needsUpdate = true; posE.needsUpdate = true;
          m.solidGeo.computeVertexNormals();
        }
      });
      
      tl.to(systemGroup.rotation, {x: -Math.PI/6, z: Math.PI/12, duration: 2, ease: "power2.inOut"}, "-=1.5");

      tl.to(feedObj.scale, {x: 1, y: 1, z: 1, duration: 1, ease: "back.out(1.7)"});
      
      waveGroup.children.forEach((wave, idx) => {
          tl.to(wave.scale, {x: FOCAL_LENGTH*2, y: FOCAL_LENGTH*2, duration: 1.5, ease: "power1.out"}, "-=1" + (idx*0.3));
          tl.to(waveMats[idx], {opacity: 0.8, duration: 0.3}, "-=1" + (idx*0.3));
          tl.to(waveMats[idx], {opacity: 0, duration: 1.2}, "-=0.7" + (idx*0.3));
      });

      tl.to(solidMat.color, {r: 1, g: 0.2, b: 0, duration: 1.5}, "-=0.5");
      tl.to(solidMat, {emissive: new THREE.Color(0x551100), duration: 1.5}, "-=1.5");
      
      tl.to(radMat, {opacity: 0.6, duration: 1});
      tl.fromTo(radObj.scale, {x:0, y:0, z:0}, {x:1, y:1, z:1, duration: 2, ease: "elastic.out(1, 0.7)"}, "-=0.5");

      tl.to("#metrics-panel", {opacity: 1, duration: 1});
      
      const targetMetrics = window.meshData && window.meshData.metrics ? window.meshData.metrics : { directivity: 43.1, hpbw: 1.1, sll: -25.0 };
      const curMetrics = { dir: 0, hpbw: 0, sll: 0 };
      
      tl.to(curMetrics, {
        dir: targetMetrics.directivity || 43.1,
        hpbw: targetMetrics.hpbw || 1.1,
        sll: targetMetrics.sll || -25.0,
        duration: 2, ease: "power2.out",
        onUpdate: () => {
          document.getElementById('val-dir').innerText = curMetrics.dir.toFixed(1) + " dBi";
          document.getElementById('val-hpbw').innerText = curMetrics.hpbw.toFixed(1) + "°";
          document.getElementById('val-sll').innerText = curMetrics.sll.toFixed(1) + " dB";
        }
      });
      
      tl.to(systemGroup.rotation, {z: systemGroup.rotation.z + Math.PI*2, duration: 10, ease: "none"}, "-=2");
    }

    // --- RECORDING LOGIC ---
    function startRecording() {
      document.getElementById('status-indicator').classList.add('recording');
      stream = canvas.captureStream(60);
      let options = { mimeType: 'video/webm; codecs=vp9' };
      if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = function() {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); document.body.appendChild(a);
        a.style = 'display: none'; a.href = url; a.download = 'maxwell_data_flow_actual.webm';
        a.click(); window.URL.revokeObjectURL(url);
        document.getElementById('status-indicator').classList.remove('recording');
        document.getElementById('status-indicator').innerText = "● SAVED";
        document.getElementById('status-indicator').style.color = "#00ffcc";
        document.getElementById('status-indicator').style.borderColor = "#00ffcc";
      };
      mediaRecorder.start();
      startAnimationSequence();
    }
    
    function stopRecording() {
      setTimeout(() => { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }, 4000); 
    }

    document.getElementById('btn-start').addEventListener('click', startRecording);
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

    // --- INIT ---
    if (MAXWELL_DATA && Object.keys(MAXWELL_DATA).length > 0) {
        initMaxwellMesh(MAXWELL_DATA);
    } else {
        console.warn("MAXWELL_DATA is empty. Run inject script.");
    }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();
      if (radObj && radObj.scale.x > 0) radObj.rotation.z = time * 0.5;
      renderer.render(scene, camera);
    }
    animate();
  </script>
